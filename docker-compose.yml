services:
  qdrant:
    image: qdrant/qdrant:latest
    volumes:
      - qdrant_data:/qdrant/storage
      - app_data:/snapshots

  app:
    build: .
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      - QDRANT_HOST=qdrant
    volumes:
      - app_data:/app/data
    depends_on:
      - qdrant

volumes:
  qdrant_data:
  app_data:
